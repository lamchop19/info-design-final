<!-- 1903 Tour de France — Finishing Speed Chart -->
<!-- Dependencies: Chart.js 4.4.1 -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>

<div style="max-width: 800px; margin: 0 auto;">

  <!-- Legend -->
  <p style="font-size:11px; color:#888780; letter-spacing:.08em; text-transform:uppercase; margin:0 0 4px;">1903 Tour de France — finishing speed (km/h)</p>
  <div style="display:flex; gap:16px; margin-bottom:12px; font-size:12px; color:#888780;">
    <span style="display:flex; align-items:center; gap:5px;"><span style="width:10px; height:10px; border-radius:2px; background:#C9A84C; display:inline-block;"></span>1st place</span>
    <span style="display:flex; align-items:center; gap:5px;"><span style="width:10px; height:10px; border-radius:2px; background:#A8A8A8; display:inline-block;"></span>2nd place</span>
    <span style="display:flex; align-items:center; gap:5px;"><span style="width:10px; height:10px; border-radius:2px; background:#A0674A; display:inline-block;"></span>3rd place</span>
    <span style="display:flex; align-items:center; gap:5px;"><span style="width:10px; height:10px; border-radius:2px; background:#B5D4F4; display:inline-block;"></span>Finisher</span>
  </div>

  <!-- Chart canvas -->
  <div style="position:relative; width:100%; height:980px;">
    <canvas id="tdf1903Chart" role="img"
      aria-label="Horizontal bar chart of 1903 Tour de France finisher speeds. Maurice Garin leads at 25.68 km/h, Arsène Millocheau last at 15.61 km/h.">
      1903 Tour de France finishing speeds from Maurice Garin at 25.68 km/h to Arsène Millocheau at 15.61 km/h.
    </canvas>
  </div>

</div>

<script>
  const tdfRiders = [
    "Maurice Garin","Lucien Pothier","Fernand Augereau","Rodolphe Muller",
    "Jean-Baptiste Fischer","Marcel Kerff","Julien Lootens","Georges Pasquier",
    "François Beaugendre","Alois Catteau","Jean Dargassies","Ferdinand Payan",
    "Julien Girbe","Isidore Le Chartier","Josef Fischer","Alexandre Foureaux",
    "René Salais","Emile Moulin","Georges Borot","Pierre Desvages","Arsène Millocheau"
  ];

  const tdfSpeeds = [
    25.68,24.89,24.51,24.47,24.35,23.89,23.32,22.91,22.81,22.41,
    22.19,22.12,21.32,21.17,20.96,19.83,19.71,17.31,17.08,15.82,15.61
  ];

  const tdfColors = tdfSpeeds.map((_, i) => {
    if (i === 0) return '#C9A84C'; // gold
    if (i === 1) return '#A8A8A8'; // silver
    if (i === 2) return '#A0674A'; // bronze
    return '#B5D4F4';              // other finishers
  });

  // ─── FONT CONFIG ──────────────────────────────────────────────
  // Change these to match your page's typeface.
  // Any font already loaded on your page works here.
  const CHART_FONT_FAMILY = 'Georgia, serif'; // ← swap to your font
  const CHART_FONT_SIZE   = 11;               // px, for axis tick labels
  // ──────────────────────────────────────────────────────────────

  Chart.defaults.font.family = CHART_FONT_FAMILY;
  Chart.defaults.font.size   = CHART_FONT_SIZE;

  new Chart(document.getElementById('tdf1903Chart'), {
    type: 'bar',
    data: {
      labels: tdfRiders,
      datasets: [{
        data: tdfSpeeds,
        backgroundColor: tdfColors,
        borderWidth: 0,
        borderRadius: 3,
      }]
    },
    options: {
      indexAxis: 'y',
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: ctx => ` ${ctx.parsed.x.toFixed(2)} km/h`
          }
        }
      },
      scales: {
        x: {
          min: 14,
          max: 27,
          grid: { color: 'rgba(0,0,0,0.06)' },
          ticks: {
            color: '#888780',
            callback: v => v + ' km/h'
          },
          border: { display: false }
        },
        y: {
          grid: { display: false },
          ticks: { color: '#444441' },
          border: { display: false }
        }
      }
    }
  });
</script>
