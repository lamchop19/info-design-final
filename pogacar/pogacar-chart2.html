const POGACAR_TEAM = 'UAE TEAM EMIRATES XRG';
const VING_TEAM = 'TEAM VISMA | LEASE A BIKE';

const byTeam = {};
raw.forEach(r => {
  if (!byTeam[r.team]) byTeam[r.team] = [];
  byTeam[r.team].push(r.rank);
});

function quartiles(arr) {
  const s = [...arr].sort((a,b) => a-b);
  const q = p => {
    const pos = (s.length - 1) * p;
    const lo = Math.floor(pos), hi = Math.ceil(pos), frac = pos - lo;
    return s[lo] + (s[hi] - s[lo]) * frac;
  };
  return { min: s[0], q1: q(0.25), median: q(0.5), q3: q(0.75), max: s[s.length-1] };
}

const stats = Object.entries(byTeam).map(([team, vals]) => ({
  team, short: teamShort[team] || team, ...quartiles(vals)
}));
stats.sort((a,b) => a.median - b.median);

const labels = stats.map(s => s.short);
const data = stats.map(s => ({ min: s.min, q1: s.q1, median: s.median, q3: s.q3, max: s.max }));

const PURPLE = '#7F77DD';
const TEAL   = '#1D9E75';
const GRAY   = '#B4B2A9';

const borderColors = stats.map(s =>
  s.team === POGACAR_TEAM ? PURPLE : s.team === VING_TEAM ? TEAL : GRAY
);
const bgColors = stats.map(s =>
  s.team === POGACAR_TEAM ? 'rgba(127,119,221,0.2)' : s.team === VING_TEAM ? 'rgba(29,158,117,0.2)' : 'rgba(180,178,169,0.12)'
);
const borderWidths = stats.map(s =>
  (s.team === POGACAR_TEAM || s.team === VING_TEAM) ? 2.5 : 1
);

new Chart(document.getElementById('boxChart'), {
  type: 'boxplot',
  data: {
    labels,
    datasets: [{
      label: 'Finishing rank',
      data,
      backgroundColor: bgColors,
      borderColor: borderColors,
      borderWidth: borderWidths,
      medianColor: borderColors,
      whiskerColor: borderColors,
      outlierRadius: 3,
    }]
  },
  options: {
    indexAxis: 'y',
    responsive: true,
    maintainAspectRatio: false,
    plugins: {
      legend: { display: false },
      tooltip: {
        callbacks: {
          label: ctx => {
            const d = ctx.raw;
            return [
              `Best: ${Math.round(d.min)}`,
              `Q1: ${Math.round(d.q1)}`,
              `Median: ${Math.round(d.median)}`,
              `Q3: ${Math.round(d.q3)}`,
              `Worst: ${Math.round(d.max)}`,
            ];
          }
        }
      }
    },
    scales: {
      x: {
        title: { display: true, text: 'Finishing rank (lower = better)', font: { size: 12 }, color: '#888780' },
        ticks: { font: { size: 11 }, color: '#888780', callback: v => Math.round(v) },
        grid: { color: 'rgba(136,135,128,0.12)' },
        min: 0, max: 165
      },
      y: {
        ticks: {
          font: ctx => {
            const label = labels[ctx.index];
            const team = stats[ctx.index]?.team;
            return { size: 11, weight: (team === POGACAR_TEAM || team === VING_TEAM) ? 500 : 400 };
          },
          color: ctx => {
            const team = stats[ctx.index]?.team;
            return team === POGACAR_TEAM ? PURPLE : team === VING_TEAM ? TEAL : '#888780';
          }
        },
        grid: { display: false }
      }
    }
  }
