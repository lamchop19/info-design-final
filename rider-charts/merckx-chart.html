
<div style="position: relative; width: 100%; height: 400px;">
  <canvas id="radarChart2" role="img" aria-label="Radar chart showing Eddy Merckx's Tour de France stage wins by terrain type: Individual TT 9, Prologue 3, Mountain 9, Flat 7, Hilly 2.">Merckx stage wins by type: Individual TT 9, Prologue 3, Mountain 9, Flat 7, Hilly 2.</canvas>
</div>

<div style="display: flex; flex-wrap: wrap; gap: 16px; justify-content: center; margin-top: 12px; font-size: 13px; color: var(--color-text-secondary);">
  <span style="display: flex; align-items: center; gap: 6px;">
    <span style="width: 10px; height: 10px; border-radius: 2px; background: #185FA5; opacity: 0.6;"></span>Stage wins (n=34)
  </span>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
  const isDark = matchMedia('(prefers-color-scheme: dark)').matches;
  const gridColor = isDark ? 'rgba(255,255,255,0.12)' : 'rgba(0,0,0,0.1)';
  const labelColor = isDark ? '#B4B2A9' : '#5F5E5A';
  const pointLabelColor = isDark ? '#D3D1C7' : '#2C2C2A';

  new Chart(document.getElementById('radarChart2'), {
    type: 'radar',
    data: {
      labels: ['Individual TT', 'Prologue', 'Mountain', 'Flat', 'Hilly'],
      datasets: [{
        label: 'Stage wins',
        data: [9, 3, 9, 7, 2],
        backgroundColor: 'rgba(24, 95, 165, 0.18)',
        borderColor: '#185FA5',
        borderWidth: 2,
        pointBackgroundColor: '#185FA5',
        pointRadius: 5,
        pointHoverRadius: 7,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: ctx => ` ${ctx.raw} wins`
          }
        }
      },
      scales: {
        r: {
          min: 0,
          max: 12,
          ticks: {
            stepSize: 2,
            color: labelColor,
            font: { size: 11 },
            backdropColor: 'transparent',
          },
          grid: { color: gridColor },
          angleLines: { color: gridColor },
          pointLabels: {
            color: pointLabelColor,
            font: { size: 13 }
          }
        }
      }
    }
  });
</script>
