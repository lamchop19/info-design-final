
<h2 class="sr-only">Scatter chart showing Tour de France winning margins from 1903 to 2025 on a logarithmic scale, with six riders highlighted including LeMond's record 8-second win in 1989.</h2>

<div style="display: flex; gap: 16px; margin: 1rem 0 0.5rem; font-size: 12px; color: var(--color-text-secondary); flex-wrap: wrap; align-items: center;">
  <span style="display: flex; align-items: center; gap: 5px;"><span style="width: 10px; height: 10px; border-radius: 50%; background: #888780; opacity: 0.55;"></span>All other years</span>
  <span style="display: flex; align-items: center; gap: 5px;"><span style="width: 10px; height: 10px; border-radius: 50%; background: #D85A30;"></span>LeMond 1989</span>
  <span style="display: flex; align-items: center; gap: 5px;"><span style="width: 10px; height: 10px; border-radius: 50%; background: #7F77DD;"></span>Featured riders</span>
  <span style="font-size: 11px; font-style: italic; align-self: center;">Y-axis: log scale</span>
</div>

<div style="position: relative; width: 100%; height: 460px;">
  <canvas id="marginChart" role="img" aria-label="Scatter chart of Tour de France winning margins by year on a logarithmic scale. LeMond's 1989 win at 8 seconds is the smallest margin in history. Other highlighted riders include Garin 1903, Coppi 1949, Merckx 1969, Hinault 1985, and Pogacar 2020.">Tour de France winning margins 1903–2025.</canvas>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const allData = [
  {year:1904,gap:8174},
  {year:1913,gap:517},{year:1914,gap:110},{year:1919,gap:6174},{year:1920,gap:3441},
  {year:1921,gap:1116},{year:1922,gap:2475},{year:1923,gap:1841},{year:1924,gap:2136},
  {year:1925,gap:3260},{year:1926,gap:4945},{year:1927,gap:6501},{year:1928,gap:3007},
  {year:1929,gap:2663},{year:1930,gap:853},{year:1931,gap:776},{year:1932,gap:1443},
  {year:1933,gap:241},{year:1934,gap:1651},{year:1935,gap:1072},{year:1936,gap:1615},
  {year:1937,gap:437},{year:1938,gap:1107},{year:1939,gap:1838},{year:1947,gap:238},
  {year:1948,gap:1612},{year:1950,gap:570},{year:1951,gap:1320},
  {year:1952,gap:1697},{year:1953,gap:858},{year:1954,gap:949},{year:1955,gap:293},
  {year:1956,gap:85},{year:1957,gap:896},{year:1958,gap:190},{year:1959,gap:241},
  {year:1960,gap:302},{year:1961,gap:734},{year:1962,gap:299},{year:1963,gap:215},
  {year:1964,gap:55},{year:1965,gap:160},{year:1966,gap:67},{year:1967,gap:220},
  {year:1968,gap:38},{year:1970,gap:761},{year:1971,gap:591},
  {year:1972,gap:641},{year:1973,gap:951},{year:1974,gap:484},{year:1975,gap:167},
  {year:1976,gap:254},{year:1977,gap:48},{year:1978,gap:236},{year:1979,gap:787},
  {year:1980,gap:415},{year:1981,gap:874},{year:1982,gap:381},{year:1983,gap:244},
  {year:1984,gap:632},{year:1986,gap:190},{year:1987,gap:40},
  {year:1988,gap:433},{year:1990,gap:136},{year:1991,gap:216},{year:1992,gap:275},
  {year:1993,gap:299},{year:1994,gap:339},{year:1995,gap:275},{year:1996,gap:101},
  {year:1997,gap:549},{year:1998,gap:201},{year:2007,gap:23},{year:2008,gap:58},
  {year:2009,gap:251},{year:2010,gap:181},{year:2011,gap:94},{year:2012,gap:201},
  {year:2013,gap:260},{year:2014,gap:457},{year:2015,gap:72},{year:2016,gap:245},
  {year:2017,gap:54},{year:2018,gap:111},{year:2019,gap:71},
  {year:2021,gap:320},{year:2022,gap:163},{year:2023,gap:449},{year:2024,gap:377},
  {year:2025,gap:264}
];

const highlighted = [
  {year:1903, gap:10761, label:'Garin 1903'},
  {year:1949, gap:655,   label:'Coppi 1949'},
  {year:1969, gap:1074,  label:'Merckx 1969'},
  {year:1985, gap:102,   label:'Hinault 1985'},
  {year:2020, gap:59,    label:'Pogacar 2020'},
];

const lemond = {year:1989, gap:8, label:'LeMond 1989'};

function fmtSeconds(s) {
  s = Math.round(s);
  if (s < 60) return s + 's';
  const h = Math.floor(s / 3600);
  const m = Math.floor((s % 3600) / 60);
  const sec = s % 60;
  if (h > 0 && m > 0) return `${h}h ${m}m`;
  if (h > 0) return `${h}h`;
  return sec > 0 ? `${m}m ${sec}s` : `${m}m`;
}

const highlightedYears = new Set([...highlighted.map(d=>d.year), lemond.year]);
const normalPts = allData.filter(d => !highlightedYears.has(d.year)).map(d => ({x:d.year, y:d.gap}));
const highlightPts = highlighted.map(d => ({x:d.year, y:d.gap, label:d.label}));
const lemondPt = [{x:lemond.year, y:lemond.gap, label:lemond.label}];

const labelOffsets = {
  'Garin 1903':   {dx: 10, dy: -14, anchor:'left'},
  'Coppi 1949':   {dx: 10, dy:  14, anchor:'left'},
  'Merckx 1969':  {dx: 10, dy: -14, anchor:'left'},
  'Hinault 1985': {dx: -10, dy: -14, anchor:'right'},
  'Pogacar 2020': {dx: -10, dy: 14, anchor:'right'},
  'LeMond 1989':  {dx: 12, dy: 4, anchor:'left'},
};

new Chart(document.getElementById('marginChart'), {
  type: 'scatter',
  data: {
    datasets: [
      {
        label: 'All other years',
        data: normalPts,
        backgroundColor: 'rgba(136,135,128,0.45)',
        pointRadius: 4.5,
        pointHoverRadius: 6,
        pointStyle: 'circle'
      },
      {
        label: 'Featured riders',
        data: highlightPts,
        backgroundColor: '#7F77DD',
        pointRadius: 8,
        pointHoverRadius: 10,
        pointStyle: 'circle',
        borderColor: '#7F77DD',
        borderWidth: 2
      },
      {
        label: 'LeMond 1989',
        data: lemondPt,
        backgroundColor: '#D85A30',
        pointRadius: 9,
        pointHoverRadius: 11,
        pointStyle: 'circle',
        borderColor: '#D85A30',
        borderWidth: 2
      }
    ]
  },
  options: {
    responsive: true,
    maintainAspectRatio: false,
    layout: { padding: { top: 30, right: 30, bottom: 10, left: 10 } },
    plugins: {
      legend: { display: false },
      tooltip: {
        callbacks: {
          label: ctx => {
            const lbl = ctx.raw.label ? ctx.raw.label + ': ' : `${ctx.parsed.x}: `;
            return lbl + fmtSeconds(ctx.parsed.y);
          }
        },
        backgroundColor: 'rgba(44,44,42,0.9)',
        titleColor: '#fff',
        bodyColor: '#ccc',
        padding: 10
      }
    },
    scales: {
      x: {
        title: {
          display: true,
          text: 'Year',
          color: '#444441',
          font: { size: 14, weight: '500' }
        },
        ticks: {
          color: '#888780',
          font: { size: 11 },
          callback: v => String(v)
        },
        grid: { color: 'rgba(136,135,128,0.15)' },
        min: 1895,
        max: 2025
      },
      y: {
        type: 'logarithmic',
        title: {
          display: true,
          text: 'Margin of victory',
          color: '#444441',
          font: { size: 14, weight: '500' }
        },
        min: 5,
        max: 25000,
        ticks: {
          color: '#888780',
          font: { size: 11 },
          callback: v => {
            const nice = [8, 30, 60, 300, 600, 1800, 3600, 7200, 18000];
            return nice.includes(v) ? fmtSeconds(v) : null;
          }
        },
        grid: { color: 'rgba(136,135,128,0.15)' }
      }
    }
  },
  plugins: [{
    id: 'custom-labels',
    afterDatasetsDraw(chart) {
      const {ctx} = chart;
      ctx.save();

      const drawLabel = (pt, label, color) => {
        const off = labelOffsets[label] || {dx:10, dy:-10, anchor:'left'};
        const x = pt.x + off.dx;
        const y = pt.y + off.dy;
        ctx.font = '500 11px sans-serif';
        ctx.fillStyle = color;
        ctx.textAlign = off.anchor === 'right' ? 'right' : 'left';
        ctx.fillText(label, x, y);
      };

      const hMeta = chart.getDatasetMeta(1);
      hMeta.data.forEach((pt, i) => {
        drawLabel(pt, highlightPts[i].label, '#7F77DD');
      });

      const lMeta = chart.getDatasetMeta(2);
      if (lMeta.data.length) {
        drawLabel(lMeta.data[0], 'LeMond 1989', '#D85A30');
        ctx.font = '400 10px sans-serif';
        ctx.fillStyle = '#D85A30';
        ctx.textAlign = 'left';
        ctx.fillText('8 seconds', lMeta.data[0].x + 12, lMeta.data[0].y + 17);
      }

      ctx.restore();
    }
  }]
});
</script>
