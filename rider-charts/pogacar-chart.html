
<h2 class="sr-only">Scatter chart of Tour de France winner ages by year. Hover legend items to highlight each dynasty. Armstrong's stripped titles shown in grey with asterisk.</h2>

<style>
.legend-btn {
  display: flex; align-items: center; gap: 6px;
  padding: 4px 10px; border-radius: 20px;
  border: 1px solid transparent;
  cursor: default; font-size: 12px;
  color: var(--color-text-secondary);
  background: transparent;
  transition: opacity 0.15s;
  white-space: nowrap;
  user-select: none;
}
.legend-btn.hoverable { cursor: pointer; }
.legend-btn.hoverable:hover { background: var(--color-background-secondary); }
.dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
</style>

<div id="legend" style="display: flex; flex-wrap: wrap; gap: 6px; margin: 1rem 0 0.75rem;"></div>

<div style="position: relative; width: 100%; height: 420px;">
  <canvas id="ageChart" role="img" aria-label="Scatter chart of Tour de France winner ages from 1903 to 2025, with multi-time winners color-coded. Hover legend to highlight.">Ages range from 19 to 36. Pogacar won at ages 21, 22, 25, and 26.</canvas>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const dynasties = [
  { name: 'Pogacar',    wins: 4, years: [2020,2021,2024,2025], color: '#7F77DD', border: '#534AB7' },
  { name: 'Anquetil',   wins: 5, years: [1957,1961,1962,1963,1964], color: '#1D9E75', border: '#0F6E56' },
  { name: 'Merckx',     wins: 5, years: [1969,1970,1971,1972,1974], color: '#378ADD', border: '#185FA5' },
  { name: 'Hinault',    wins: 5, years: [1978,1979,1981,1982,1985], color: '#D4537E', border: '#993556' },
  { name: 'Indurain',   wins: 5, years: [1991,1992,1993,1994,1995], color: '#EF9F27', border: '#BA7517' },
  { name: 'Armstrong*', wins: 7, years: [1999,2000,2001,2002,2003,2004,2005], color: '#888780', border: '#5F5E5A', stripped: true },
  { name: 'Froome',     wins: 4, years: [2013,2015,2016,2017], color: '#E24B4A', border: '#A32D2D' },
  { name: 'LeMond',     wins: 3, years: [1986,1989,1990], color: '#D85A30', border: '#993C1D' },
  { name: 'Bobet',      wins: 3, years: [1953,1954,1955], color: '#639922', border: '#3B6D11' },
];

const allData = [
  {year:1903,age:32},{year:1904,age:19},{year:1905,age:24},{year:1906,age:27},{year:1907,age:24},{year:1908,age:25},
  {year:1909,age:22},{year:1910,age:21},{year:1911,age:27},{year:1912,age:24},{year:1913,age:23},{year:1914,age:24},
  {year:1919,age:33},{year:1920,age:30},{year:1921,age:33},{year:1922,age:36},{year:1923,age:33},{year:1924,age:30},
  {year:1925,age:31},{year:1926,age:34},{year:1927,age:28},{year:1928,age:29},{year:1929,age:33},{year:1930,age:26},
  {year:1931,age:27},{year:1932,age:28},{year:1933,age:26},{year:1934,age:30},{year:1935,age:22},{year:1936,age:27},
  {year:1937,age:26},{year:1938,age:24},{year:1939,age:30},{year:1947,age:26},{year:1948,age:34},{year:1949,age:30},
  {year:1950,age:31},{year:1951,age:26},{year:1952,age:33},{year:1953,age:28},{year:1954,age:29},{year:1955,age:30},
  {year:1956,age:29},{year:1957,age:23},{year:1958,age:26},{year:1959,age:31},{year:1960,age:30},{year:1961,age:27},
  {year:1962,age:28},{year:1963,age:29},{year:1964,age:30},{year:1965,age:23},{year:1966,age:25},{year:1967,age:27},
  {year:1968,age:28},{year:1969,age:24},{year:1970,age:25},{year:1971,age:26},{year:1972,age:27},{year:1973,age:28},
  {year:1974,age:29},{year:1975,age:27},{year:1976,age:30},{year:1977,age:29},{year:1978,age:24},{year:1979,age:25},
  {year:1980,age:34},{year:1981,age:27},{year:1982,age:28},{year:1983,age:23},{year:1984,age:24},{year:1985,age:31},
  {year:1986,age:25},{year:1987,age:28},{year:1988,age:28},{year:1989,age:28},{year:1990,age:29},{year:1991,age:27},
  {year:1992,age:28},{year:1993,age:29},{year:1994,age:30},{year:1995,age:31},{year:1996,age:32},{year:1997,age:24},
  {year:1998,age:28},{year:1999,age:28},{year:2000,age:29},{year:2001,age:30},{year:2002,age:31},{year:2003,age:32},
  {year:2004,age:33},{year:2005,age:34},{year:2006,age:30},{year:2007,age:24},{year:2008,age:33},{year:2009,age:26},
  {year:2010,age:25},{year:2011,age:34},{year:2012,age:32},{year:2013,age:32},{year:2014,age:29},{year:2015,age:34},
  {year:2016,age:35},{year:2017,age:36},{year:2018,age:32},{year:2019,age:22},{year:2020,age:21},{year:2021,age:22},
  {year:2022,age:25},{year:2023,age:26},{year:2024,age:25},{year:2025,age:26}
];

const dynastyYearSet = new Set(dynasties.flatMap(d => d.years));
const greyPts = allData.filter(d => !dynastyYearSet.has(d.year));
const avgAge = Math.round(allData.reduce((s,d) => s+d.age, 0) / allData.length);

const GREY_DEFAULT = '#B4B2A9';
const GREY_DIM     = '#B4B2A926';

function hexWithAlpha(hex, alpha) {
  const a = Math.round(alpha * 255).toString(16).padStart(2,'0');
  return hex.slice(0,7) + a;
}

const chart = new Chart(document.getElementById('ageChart'), {
  type: 'scatter',
  data: {
    datasets: [
      {
        label: 'Other winners',
        data: greyPts.map(d => ({x:d.year, y:d.age})),
        backgroundColor: GREY_DEFAULT,
        borderWidth: 0,
        pointRadius: 5,
        pointHoverRadius: 7,
      },
      ...dynasties.map(d => ({
        label: d.name,
        data: allData.filter(r => d.years.includes(r.year)).map(r => ({x:r.year, y:r.age})),
        backgroundColor: d.color,
        borderColor: d.border,
        borderWidth: 1.5,
        pointRadius: d.name === 'Pogacar' ? 7 : 6,
        pointHoverRadius: 9,
        _meta: d,
      }))
    ]
  },
  options: {
    responsive: true,
    maintainAspectRatio: false,
    animation: false,
    plugins: {
      legend: { display: false },
      tooltip: {
        callbacks: {
          label: ctx => `${ctx.dataset.label} — ${ctx.parsed.x}, age ${ctx.parsed.y}`
        },
        backgroundColor: '#2C2C2A', titleColor: '#F1EFE8',
        bodyColor: '#D3D1C7', padding: 10, cornerRadius: 6,
      }
    },
    scales: {
      x: {
        type: 'linear', min: 1900, max: 2028,
        title: { display: true, text: 'Year', color: '#888780', font: { size: 12, weight: '500' } },
        ticks: { color: '#888780', stepSize: 10, callback: v => v },
        grid: { color: 'rgba(136,135,128,0.12)' },
        border: { color: 'rgba(136,135,128,0.2)' }
      },
      y: {
        min: 17, max: 39,
        title: { display: true, text: 'Age at time of victory', color: '#888780', font: { size: 12, weight: '500' } },
        ticks: { color: '#888780', stepSize: 5 },
        grid: { color: 'rgba(136,135,128,0.12)' },
        border: { color: 'rgba(136,135,128,0.2)' }
      }
    }
  },
  plugins: [{
    id: 'avgLine',
    afterDraw(chart) {
      const {ctx, scales:{x,y}} = chart;
      const yPos = y.getPixelForValue(avgAge);
      ctx.save();
      ctx.setLineDash([5,4]);
      ctx.strokeStyle = 'rgba(136,135,128,0.4)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(x.left, yPos);
      ctx.lineTo(x.right, yPos);
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.fillStyle = '#888780';
      ctx.font = '11px sans-serif';
      ctx.textAlign = 'right';
      ctx.fillText(`avg. ${avgAge}`, x.right - 4, yPos - 5);
      ctx.restore();
    }
  }, {
    id: 'riderLabels',
    afterDraw(chart) {
      const {ctx} = chart;
      ctx.save();
      ctx.font = '500 11px sans-serif';
      dynasties.forEach((d, i) => {
        const meta = chart.getDatasetMeta(i + 1);
        if (!meta.data.length) return;
        const firstPt = meta.data[0];
        const isPog = d.name === 'Pogacar';
        const ds = chart.data.datasets[i + 1];
        const bg = ds.backgroundColor;
        ctx.fillStyle = typeof bg === 'string' ? bg.slice(0,7) : d.color;
        ctx.globalAlpha = typeof bg === 'string' && bg.length === 9
          ? parseInt(bg.slice(7), 16) / 255
          : 1;
        ctx.textAlign = isPog ? 'right' : 'left';
        ctx.fillText(d.name, firstPt.x + (isPog ? -10 : 10), firstPt.y - 13);
      });
      ctx.globalAlpha = 1;
      ctx.textAlign = 'left';
      ctx.restore();
    }
  }]
});

function applyHighlight(hoveredName) {
  chart.data.datasets.forEach((ds, i) => {
    if (i === 0) {
      ds.backgroundColor = hoveredName ? GREY_DIM : GREY_DEFAULT;
      return;
    }
    const d = dynasties[i - 1];
    const isHovered = d.name === hoveredName;
    if (!hoveredName) {
      ds.backgroundColor = d.color;
      ds.borderColor = d.border;
    } else if (isHovered) {
      ds.backgroundColor = d.color;
      ds.borderColor = d.border;
    } else {
      ds.backgroundColor = hexWithAlpha(d.color, 0.12);
      ds.borderColor = hexWithAlpha(d.border, 0.12);
    }
  });
  chart.update('none');
}

const legend = document.getElementById('legend');
const otherBtn = document.createElement('div');
otherBtn.className = 'legend-btn';
otherBtn.innerHTML = `<span class="dot" style="background:${GREY_DEFAULT};"></span>Other winners`;
legend.appendChild(otherBtn);

dynasties.forEach(d => {
  const btn = document.createElement('div');
  btn.className = 'legend-btn hoverable';
  const winsLabel = ` (${d.wins}${d.stripped ? ', stripped' : ''})`;
  btn.innerHTML = `<span class="dot" style="background:${d.color};"></span>${d.name}${winsLabel}`;
  btn.style.color = d.color;
  btn.addEventListener('mouseenter', () => applyHighlight(d.name));
  btn.addEventListener('mouseleave', () => applyHighlight(null));
  legend.appendChild(btn);
});
</script>
